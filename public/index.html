<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Grow is your best friend for Apple Watch."
    />
    <link rel="icon" href="assets/big-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sriracha&display=swap"
      rel="stylesheet"
    />
    <!-- Meta Pixel Code -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = true;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = true;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
      fbq("init", "1346074534219735");
      fbq("track", "PageView");
    </script>
    <!-- End Meta Pixel Code -->
    <link rel="stylesheet" href="styles.css" />
    <title>Grow</title>
  </head>
  <body>
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=1346074534219735&ev=PageView&noscript=1"
        alt=""
      />
    </noscript>
    <main class="page">
      <section class="hero" aria-label="Grow app promotion">
        <div class="hero__body">
          <div class="hero__brand">
            <img
              class="hero__logo"
              src="assets/big-logo.png"
              alt="Grow app logo"
              width="260"
              height="260"
            />

            <header class="hero__headline">
              <h1>Grow</h1>
              <p>Your best friend for</p>
              <p class="hero__watch">
                <span aria-hidden="true">&#63743;Watch</span>
                <span class="sr-only">Apple Watch</span>
              </p>
            </header>
          </div>

          <div class="hero__proof" aria-label="Editorial rating">
            <img
              class="hero__laurel"
              src="assets/laurel-left.svg"
              alt=""
              aria-hidden="true"
              width="45"
              height="92"
            />

            <div class="hero__choice">
              <p class="hero__choice-label">Editor&rsquo;s Choice</p>

              <div class="hero__stars" role="img" aria-label="5 out of 5 stars">
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
              </div>

              <p class="hero__rating">Over 200,000 Ratings</p>
            </div>

            <img
              class="hero__laurel hero__laurel--right"
              src="assets/laurel-right.svg"
              alt=""
              aria-hidden="true"
              width="45"
              height="92"
            />
          </div>

          <a
            id="download-link"
            class="hero__download"
            href="https://app.adjust.com/1yryvhpf"
            data-adjust-base="https://app.adjust.com/1yryvhpf"
            data-adjust-impression-base="https://view.adjust.com/impression/1yryvhpf"
            aria-label="Download Grow on the App Store"
          >
            <img
              src="assets/app-store-badge.svg"
              alt="Download on the App Store"
              width="210"
              height="70"
            />
          </a>
        </div>
      </section>
    </main>

    <script>
      const downloadLink = document.getElementById("download-link");

      if (downloadLink) {
        const pageUrl = new URL(window.location.href);
        const targetUrl = new URL(downloadLink.dataset.adjustBase);
        const impressionUrl = new URL(downloadLink.dataset.adjustImpressionBase);

        ["campaign", "adgroup", "creative", "fbclid"].forEach((key) => {
          const value = pageUrl.searchParams.get(key);

          if (value) {
            targetUrl.searchParams.set(key, value);
            impressionUrl.searchParams.set(key, value);
          }
        });

        downloadLink.href = targetUrl.toString();

        const reportImpression = () => {
          if (downloadLink.dataset.adjustImpressionTracked === "true") {
            return;
          }

          downloadLink.dataset.adjustImpressionTracked = "true";
          new Image().src = impressionUrl.toString();
        };

        if ("IntersectionObserver" in window) {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  reportImpression();
                  observer.disconnect();
                }
              });
            },
            { threshold: 0.5 }
          );

          observer.observe(downloadLink);
        } else {
          reportImpression();
        }
      }
    </script>
  </body>
</html>
