<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Grow is your best friend for Apple Watch."
    />
    <link rel="icon" href="assets/big-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sriracha&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Grow</title>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="Grow app promotion">
        <div class="hero__body">
          <div class="hero__brand">
            <img
              class="hero__logo"
              src="assets/big-logo.png"
              alt="Grow app logo"
              width="260"
              height="260"
            />

            <header class="hero__headline">
              <h1>Grow</h1>
              <p>Your best friend for</p>
              <p class="hero__watch">
                <span aria-hidden="true">&#63743;Watch</span>
                <span class="sr-only">Apple Watch</span>
              </p>
            </header>
          </div>

          <div class="hero__proof" aria-label="Editorial rating">
            <img
              class="hero__laurel"
              src="assets/laurel-left.svg"
              alt=""
              aria-hidden="true"
              width="45"
              height="92"
            />

            <div class="hero__choice">
              <p class="hero__choice-label">Editor&rsquo;s Choice</p>

              <div class="hero__stars" role="img" aria-label="5 out of 5 stars">
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
                <span aria-hidden="true">★</span>
              </div>

              <p class="hero__rating">Over 200,000 Ratings</p>
            </div>

            <img
              class="hero__laurel hero__laurel--right"
              src="assets/laurel-right.svg"
              alt=""
              aria-hidden="true"
              width="45"
              height="92"
            />
          </div>

          <a
            id="download-link"
            class="hero__download"
            href="https://app.adjust.com/1yryvhpf"
            data-adjust-base="https://app.adjust.com/1yryvhpf"
            aria-label="Download Grow on the App Store"
          >
            <img
              src="assets/app-store-badge.svg"
              alt="Download on the App Store"
              width="210"
              height="70"
            />
          </a>
        </div>
      </section>
    </main>

    <script>
      const downloadLink = document.getElementById("download-link");

      if (downloadLink) {
        const pageUrl = new URL(window.location.href);
        const targetUrl = new URL(downloadLink.dataset.adjustBase);

        ["campaign", "adgroup", "creative", "fbclid"].forEach((key) => {
          const value = pageUrl.searchParams.get(key);

          if (value) {
            targetUrl.searchParams.set(key, value);
          }
        });

        downloadLink.href = targetUrl.toString();
      }
    </script>
  </body>
</html>
